[project]
name = "legalro-processing"
version = "0.2.0"
description = "LegalRo batch pipeline: PDF -> structured JSON -> chunks+embeddings -> bundle -> Mongo."
requires-python = ">=3.12"
dependencies = [
    "legalro-core[ml]",
    "pymupdf>=1.25.0",
    "docling>=2.0.0",
    "tiktoken>=0.8.0",
    "llama-parse>=0.6.0",
    "mistralai>=1.0.0",
]

# macOS-only local OCR (Apple Vision). Never installed in the cloud image.
[project.optional-dependencies]
local = ["ocrmac>=1.0.0"]

[project.scripts]
legalro-process = "legalro_processing.cli:app"

[tool.uv.sources]
legalro-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/legalro_processing"]
