[project]
name = "legalro-dashboard"
version = "0.2.0"
description = "LegalRo read-only observability: processing run-ledger + serving health/query log."
requires-python = ">=3.12"
# Depends on base legalro-core ONLY (no [ml]) — the dashboard never embeds or
# parses; it just reads status collections from Mongo. Keeps the image tiny.
dependencies = [
    "legalro-core",
    "fastapi>=0.115.0",
    "uvicorn>=0.34.0",
    "jinja2>=3.1.0",
]

[project.scripts]
legalro-dashboard = "legalro_dashboard.app:main"

[tool.uv.sources]
legalro-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/legalro_dashboard"]
