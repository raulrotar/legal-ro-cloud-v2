[project]
name = "legalro-serving"
version = "0.2.0"
description = "LegalRo read-only query service: hybrid search + LLM answer. No ingestion deps."
requires-python = ">=3.12"
dependencies = [
    "legalro-core[ml]",
    "fastapi>=0.115.0",
    "uvicorn>=0.34.0",
    "httpx>=0.28.0",
    "pydantic-ai>=0.1.0",
    "typer>=0.15.0",
    "rich>=13.9.0",
]

[project.scripts]
# Thin CLI client (talks to the API over HTTP; no in-process pipeline).
legalro = "legalro_serving.cli:app"

[tool.uv.sources]
legalro-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/legalro_serving"]
