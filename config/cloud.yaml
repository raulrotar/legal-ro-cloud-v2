llm:
  provider: "gemini"
  base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
  model: "gemini-3.1-flash-lite"
  api_key: ""          # override via GEMINI_API_KEY env var
  max_tokens: 8192
  temperature: 0.1
  agentic_max_tokens: 4096
  agentic_timeout: 10.0

# Fallback LLM if Groq rate limit is hit (uncomment and set GEMINI_API_KEY):
# llm:
#   provider: "gemini"
#   base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
#   model: "gemini-2.5-flash"
#   api_key: ""

embeddings:
  provider: "sentence-transformers"
  model: "BAAI/bge-m3"
  dimensions: 1024
  batch_size: 16

ocr:
  provider: "llamaparse"   # mistral | llamaparse | docling | ocrmac (local only)
  language: "ro"

mongodb:
  uri: ""   # set via MONGODB_URI env var
  database: "legalro"

search:
  use_rank_fusion: false
  vector_weight: 0.3
  text_weight: 0.7
  rrf_k: 60
  num_candidates: 200
  limit: 20
  parent_doc_top_n: 3
  max_parent_chars: 8000

# ── LLM-based extraction (Option B) ──────────────────────────────────────────
# Set enabled: true to activate during extraction runs.
# On cloud: inherits llm.base_url + model (Gemini) and GEMINI_API_KEY.
# api_key is set via GEMINI_API_KEY env var — do not hardcode here.
extraction_llm:
  enabled: false               # flip to true to activate
  # ── Option B (metadata only) ──────────────────────────────────────────────
  mode: "metadata_only"        # switch to "md_llm" for Option C
  metadata_enabled: true
  segmentation_enabled: false
  vlm_enabled: false
  # ── Option C (Docling→MD→LLM→JSON) ──────────────────────────────────────
  # mode: "md_llm"
  md_cache_dir: "md_cache"
  edit_distance_threshold: 0.15
  # ── Provider (empty = inherit from llm: block — Gemini) ──────────────────
  base_url: ""
  model: ""                    # e.g. "numind/NuExtract3" via vLLM on VPS
  temperature: 0.0
  max_tokens: 2048
  max_retries: 2
  # ── Fallback model for validation-triggered retries ──────────────────────
  # Primary (above): fast model (Gemini Flash Lite / NuExtract3)
  # Fallback: more capable model used when validation finds ERROR-level issues.
  # Example: primary=gemini-flash-lite, fallback=gemini-2.5-pro
  fallback_model: ""            # e.g. "gemini-2.5-pro" or vLLM endpoint
  fallback_base_url: ""
  fallback_api_key: ""
  fallback_max_tokens: 0        # 0 → same as max_tokens
