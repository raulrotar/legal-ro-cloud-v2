llm:
  provider: "mlx"
  base_url: "http://localhost:8080/v1"
  model: "mlx-community/Meta-Llama-3.1-8B-Instruct-4bit"
  max_tokens: 16384
  temperature: 0.1
  agentic_max_tokens: 4096
  agentic_timeout: 90.0

embeddings:
  provider: "mlx"
  model: "nomic-text-v1.5"
  dimensions: 768
  batch_size: 32

ocr:
  provider: "llamaparse"   # uses LLAMA_CLOUD_API_KEY; fall back to ocrmac for SCANNED if unset
  language: "ro"

mongodb:
  uri: "mongodb://localhost:27017/?directConnection=true"
  database: "legalro"

search:
  use_rank_fusion: false
  vector_weight: 0.3
  text_weight: 0.7
  rrf_k: 60
  num_candidates: 200
  limit: 15
  parent_doc_top_n: 3
  max_parent_chars: 8000

# ── LLM-based extraction (Option C: Docling→MD→LLM→JSON) ────────────────────
# base_url is empty → inherits from llm.base_url above (http://localhost:8080/v1)
# Start the server first:
#   mlx_lm.server --model numind/NuExtract3-mlx-mxfp8 --port 8080
extraction_llm:
  enabled: true
  mode: "md_llm"                      # Option C pipeline
  metadata_enabled: true
  segmentation_enabled: false
  vlm_enabled: false
  md_cache_dir: "md_cache"            # intermediate .md files (human-inspectable)
  edit_distance_threshold: 0.15       # max allowed edit ratio for LLM body-text correction
  base_url: ""                        # inherits http://localhost:8080/v1
  model: "mlx-community/Meta-Llama-3.1-8B-Instruct-4bit"   # best local: 96.9% accuracy, standard prompts
  temperature: 0.0
  max_tokens: 4096   # raised from 2048 — long ORDINs were truncating mid-JSON
  max_retries: 2
  # ── Fallback model for validation-triggered retries ──────────────────────
  # When validation finds ERROR-level issues (wrong act_number, UNKNOWN type,
  # etc.) extraction is retried with this model.  Leave fallback_model empty
  # to retry with the same model.
  # Example: switch to a larger/more capable model for hard cases.
  fallback_model: "numind/NuExtract3-mlx-mxfp8"
  fallback_base_url: ""               # empty → same as base_url (http://localhost:8080/v1)
  fallback_api_key: ""
  fallback_max_tokens: 0              # 0 → same as max_tokens
