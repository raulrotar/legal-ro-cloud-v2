llm:
  provider: "mlx"
  base_url: "http://localhost:8080/v1"
  model: "mlx-community/Qwen3.5-9B-4bit"
  max_tokens: 16384
  temperature: 0.1
  agentic_max_tokens: 4096
  agentic_timeout: 90.0

embeddings:
  provider: "mlx"
  model: "nomic-text-v1.5"
  dimensions: 768
  batch_size: 32

ocr:
  provider: "llamaparse"   # uses LLAMA_CLOUD_API_KEY; fall back to ocrmac for SCANNED if unset
  language: "ro"

mongodb:
  uri: "mongodb://localhost:27017/?directConnection=true"
  database: "legalro"

search:
  use_rank_fusion: false
  vector_weight: 0.3
  text_weight: 0.7
  rrf_k: 60
  num_candidates: 200
  limit: 15
  parent_doc_top_n: 3
  max_parent_chars: 8000

# ── LLM-based extraction (Option B) ──────────────────────────────────────────
# Set enabled: true to activate.  Phases are independent toggles.
# When base_url/model are empty, inherits from llm: above (local MLX server).
# For cloud Gemini, set base_url + model explicitly and set api_key via
# EXTRACTION_LLM_API_KEY env var (or GEMINI_API_KEY which is auto-inherited).
extraction_llm:
  enabled: true
  metadata_enabled: true       # phase 1: LLM extracts doc_type, title, authority, number
  segmentation_enabled: false  # phase 2: LLM segmentation (SCANNED era only)
  vlm_enabled: false           # phase 3: vision model on page images (SCANNED only)
  base_url: ""                 # empty → uses llm.base_url (local MLX: http://localhost:8080/v1)
  model: ""                    # empty → uses llm.model (mlx-community/Qwen3.5-9B-4bit)
  temperature: 0.0
  max_tokens: 1024
  max_retries: 2
