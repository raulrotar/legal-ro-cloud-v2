name: deploy-serving

on:
  push:
    branches: [main]
    paths:
      - "packages/serving/**"
      - "packages/core/**"
      - "Dockerfile"
      - "config/cloud.yaml"
      - ".github/workflows/deploy-serving.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "ci@github"
          git config user.name "GitHub Actions"
          git config credential.helper store
          echo "https://rraul99:${HF_TOKEN}@huggingface.co" > ~/.git-credentials
          git remote add hf https://huggingface.co/spaces/rraul99/legalro
          git push hf main --force
