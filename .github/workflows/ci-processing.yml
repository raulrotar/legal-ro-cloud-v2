# CI for the processing package. Triggers ONLY on processing or core changes.
# Processing is run as a batch job on the VPS, not auto-deployed — so this is
# test/lint only, not a deploy.
name: ci-processing

on:
  push:
    paths:
      - "packages/processing/**"
      - "packages/core/**"
      - ".github/workflows/ci-processing.yml"
  pull_request:
    paths:
      - "packages/processing/**"
      - "packages/core/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install uv
      - run: uv sync --package legalro-processing
      - run: uv run pytest tests -q
